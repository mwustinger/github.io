# The primary author of this blog.
# Must be the same as `author` in `_config.yml`.
# Change `author1` to your shortname.
author1:
  name:              Martin Wustinger
  email:             martin@wustinger.com

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about:             |
    Starting from an early age, I have been passionate about exploring and understanding complex systems, evolving from LEGO constructions 
    to algorithms and neural networks. The satisfaction of solving challenging problems and mastering difficult concepts continues 
    to drive my enthusiasm for learning and self-improvement.

    In addition to my strong analytical skills and ability to quickly acquire new knowledge, 
    I consider my interpersonal skills among my greatest strengths, which I actively develop through participation in 
    my basketball team and as a group leader in the Catholic Youth organization. In my free time, I enjoy maintaining an active lifestyle through regular exercise and dancing to classical music.

  # This photo will be used in the about section
  picture:
    path:            /assets/img/Profile.png

  # Social media icons in sidebar
  # Comment/uncommet to show/hide
  # Rearrange to change the order in which they appear
